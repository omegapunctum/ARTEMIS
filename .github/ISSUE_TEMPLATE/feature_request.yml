name: Feature request
description: Propose a new feature or product improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Какую проблему решает фича?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Что именно нужно сделать?
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Архитектурные, UI/UX, data-contract или release-ограничения.

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: checkboxes
    id: areas
    attributes:
      label: Affected areas
      options:
        - label: docs
        - label: ui
        - label: backend
        - label: etl
        - label: data
        - label: release
